# Static serving config for the CCA trainer.
# Correct MIME types for ES modules, no caching during study sessions.
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Ensure JS modules are served with the right type.
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/svg+xml                         svg;
        application/pdf                       pdf;
        font/woff2                            woff2;
    }

    # Don't cache app assets so edits show up on reload.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # The exam guide PDF lives under docs/.
    location /docs/ {
        add_header Cache-Control "no-cache";
    }
}
